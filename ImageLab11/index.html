<!DOCTYPE html>
<html>

    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <a-asset-item id="IrishRock" src="Assets/IrishRock.obj"></a-asset-item>
        <a-asset-item id="MyRoom" src="Assets/MyRoom.obj"></a-asset-item>
        <img id="MyRoomTexture" src="Assets/MyRoom.mtl">

      <a-entity gltf-model="#Carcharodontosaurus" position="0 1.5 0" rotation="0 -90 0"></a-entity>
      <a-entity gltf-model="#DanDan" position="1 1.25 0" scale=".2 .2 .2" rotation="0 -90 0"></a-entity>

      <a-sky src="#CircScape"></a-sky>
